<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #n8n-chat {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    :root {
      --chat--color-primary: #5F9598;
      --chat--color-primary-shade-50: #4a7a7d;
      --chat--color-primary-shade-100: #3d6669;
      --chat--color-secondary: #5F9598;
      --chat--header--background: #5F9598;
      --chat--header--color: #ffffff;
      --chat--message--bot--background: #ffffff;
      --chat--message--bot--color: #333333;
      --chat--message--user--background: #5F9598;
      --chat--message--user--color: #ffffff;
      --chat--input--background: #ffffff;
      --chat--input--border-color: #e0e0e0;
      --chat--background: #f7f7f7;
      --chat--font-family: 'Inter', sans-serif;
    }
    [class*="chat-header"] h1,
    [class*="header"] h1,
    [class*="chat-header"] p:first-child {
      font-family: 'Josefin Sans', sans-serif !important;
      font-size: 12px !important;
      font-weight: 300 !important;
      letter-spacing: 2.5px !important;
      text-transform: uppercase !important;
    }
  </style>
</head>
<body>
  <div id="n8n-chat"></div>
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
    createChat({
      webhookUrl: 'https://juliettelaposte.app.n8n.cloud/webhook/7811a8ee-45f2-48e0-a56f-01894142def1/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',
      showWelcomeScreen: false,
      initialMessages: [],
      defaultLanguage: 'fr',
      i18n: {
        fr: {
          title: 'My personal assistant',
          subtitle: '',
          inputPlaceholder: 'Écris ta question...',
          getStarted: 'Démarrer',
          footer: ''
        }
      }
    });
  </script>
</body>
</html>
